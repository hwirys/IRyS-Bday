worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 2048;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Rate limiting — 10 req/s per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # Timeouts (slowloris prevention)
    client_body_timeout 5s;
    client_header_timeout 5s;
    send_timeout 10s;
    keepalive_timeout 15s;

    # No uploads needed
    client_max_body_size 1k;

    # Hide version
    server_tokens off;

    # Compression
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    sendfile on;
    tcp_nopush on;

    # Temp paths writable by non-root
    client_body_temp_path /tmp/nginx_body;
    proxy_temp_path /tmp/nginx_proxy;
    fastcgi_temp_path /tmp/nginx_fastcgi;
    uwsgi_temp_path /tmp/nginx_uwsgi;
    scgi_temp_path /tmp/nginx_scgi;

    upstream backend {
        server 127.0.0.1:3000;
    }

    server {
        listen 8080;
        server_name birthday5th.irys.best;
        root /app/static;

        # Connection limit per IP
        limit_conn conn 20;

        # Security headers (for static files; API responses carry their own from backend)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self'; connect-src 'self'; frame-src https://www.youtube.com; object-src 'none'; base-uri 'self'; form-action 'none'; navigate-to 'self' https://x.com" always;

        # API — proxy to backend
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
        }

        # Hashed assets — immutable cache
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            access_log off;
        }

        # Fonts — long cache
        location /fonts/ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            access_log off;
        }

        # Static files + SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "public, max-age=300" always;
        }

        # Block dotfiles
        location ~ /\. {
            deny all;
        }
    }
}
